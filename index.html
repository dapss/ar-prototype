<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none; /* Stops pull-to-refresh and default zooming */
        overscroll-behavior: none;
      }
      /* Ensure MindAR's UI doesn't block touch events */
      #mindar-ui-overlay {
        pointer-events: none; 
      }
    </style>

    <script>
      // Sound Component
      AFRAME.registerComponent("sound-handler", {
        init: function () {
          const target = this.el;
          const audio = document.querySelector("#audio-element");
          target.addEventListener("targetFound", () => audio.play());
          target.addEventListener("targetLost", () => {
            audio.pause();
            audio.currentTime = 0; 
          });
        },
      });

      // 2. JS FIX: Simplified Touch Component
      AFRAME.registerComponent("touch-controls", {
        init: function () {
          const model = this.el;
          
          let touchStartX = 0;
          let initialPinchDist = 0;
          let startScale = 0;

          // Attach to document to ensure we catch the touch anywhere on screen
          document.addEventListener("touchstart", (e) => {
            if (e.touches.length === 1) {
              touchStartX = e.touches[0].pageX;
            } else if (e.touches.length === 2) {
              const dx = e.touches[0].pageX - e.touches[1].pageX;
              const dy = e.touches[0].pageY - e.touches[1].pageY;
              initialPinchDist = Math.sqrt(dx * dx + dy * dy);
              startScale = model.getAttribute("scale").x;
            }
          });

          document.addEventListener("touchmove", (e) => {
            if (e.touches.length === 1) {
              // Rotate
              const deltaX = e.touches[0].pageX - touchStartX;
              const currentRot = model.getAttribute("rotation");
              model.setAttribute("rotation", {
                x: currentRot.x,
                y: currentRot.y + deltaX * 1.5, // Sped up the rotation slightly
                z: currentRot.z,
              });
              touchStartX = e.touches[0].pageX;
            } else if (e.touches.length === 2) {
              // Zoom
              const dx = e.touches[0].pageX - e.touches[1].pageX;
              const dy = e.touches[0].pageY - e.touches[1].pageY;
              const currentDist = Math.sqrt(dx * dx + dy * dy);

              let newScale = startScale * (currentDist / initialPinchDist);
              newScale = Math.max(0.01, Math.min(newScale, 2.0)); // Widened the zoom limits
              model.setAttribute("scale", `${newScale} ${newScale} ${newScale}`);
            }
          });
        },
      });
    </script>
  </head>
