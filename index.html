<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <script>
      // Component to play sound effects when the QR code/target is scanned
      AFRAME.registerComponent("sound-handler", {
        init: function () {
          const target = this.el;
          const audio = document.querySelector("#audio-element");

          target.addEventListener("targetFound", (event) => {
            console.log("Target found");
            audio.play();
          });

          target.addEventListener("targetLost", (event) => {
            console.log("Target lost");
            audio.pause();
            audio.currentTime = 0; // Reset audio to beginning
          });
        },
      });

      // Component to allow 1-finger rotation and 2-finger pinch zooming
      AFRAME.registerComponent("touch-controls", {
        init: function () {
          const model = this.el;
          let isVisible = false;

          // Variables for tracking touch data
          let touchStartX = 0;
          let initialPinchDist = 0;
          let startScale = 0;

          // Only allow interactions when the AR target is physically on screen
          model.parentNode.addEventListener("targetFound", () => {
            isVisible = true;
          });
          model.parentNode.addEventListener("targetLost", () => {
            isVisible = false;
          });

          window.addEventListener("touchstart", (e) => {
            if (!isVisible) return;

            if (e.touches.length === 1) {
              // Record starting X position for 1-finger rotation
              touchStartX = e.touches[0].pageX;
            } else if (e.touches.length === 2) {
              // Record starting distance for 2-finger pinch zoom
              const dx = e.touches[0].pageX - e.touches[1].pageX;
              const dy = e.touches[0].pageY - e.touches[1].pageY;
              initialPinchDist = Math.sqrt(dx * dx + dy * dy);
              startScale = model.getAttribute("scale").x;
            }
          });

          window.addEventListener("touchmove", (e) => {
            if (!isVisible) return;

            if (e.touches.length === 1) {
              // Calculate 1-finger swipe to rotate around the Y axis
              const deltaX = e.touches[0].pageX - touchStartX;
              const currentRot = model.getAttribute("rotation");
              model.setAttribute("rotation", {
                x: currentRot.x,
                y: currentRot.y + deltaX * 0.8, // Adjust 0.8 to change rotation speed
                z: currentRot.z,
              });
              touchStartX = e.touches[0].pageX;
            } else if (e.touches.length === 2) {
              // Calculate 2-finger pinch to adjust the scale
              const dx = e.touches[0].pageX - e.touches[1].pageX;
              const dy = e.touches[0].pageY - e.touches[1].pageY;
              const currentDist = Math.sqrt(dx * dx + dy * dy);

              let newScale = startScale * (currentDist / initialPinchDist);

              // Set limits so the model cannot become microscopically small or overwhelmingly large
              newScale = Math.max(0.02, Math.min(newScale, 1.5));
              model.setAttribute(
                "scale",
                `${newScale} ${newScale} ${newScale}`,
              );
            }
          });
        },
      });
    </script>
  </head>

  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="avatarModel" src="./Dimond.glb"></a-asset-item>
        <!-- <audio id="audio-element" src="./sound.mp3" preload="auto"></audio> -->
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" sound-handler>
        <a-gltf-model
          rotation="0 0 0"
          position="0 0.2 0"
          scale="0.1 0.1 0.1"
          src="#avatarModel"
          touch-controls
          animation-mixer
        >
        </a-gltf-model>
      </a-entity>
    </a-scene>
  </body>
</html>
