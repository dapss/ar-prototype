<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none; /* Stops pull-to-refresh and default zooming */
        overscroll-behavior: none;
      }
      /* Ensure MindAR's scanning UI doesn't block touch events */
      #mindar-ui-overlay {
        pointer-events: none; 
      }
    </style>

    <script>
      // Component to play sound effects when the target is scanned
      AFRAME.registerComponent("sound-handler", {
        init: function () {
          const target = this.el;
          const audio = document.querySelector("#audio-element");

          target.addEventListener("targetFound", () => {
            console.log("Target found");
            audio.play();
          });

          target.addEventListener("targetLost", () => {
            console.log("Target lost");
            audio.pause();
            audio.currentTime = 0; // Reset audio to beginning
          });
        },
      });

      // Component to allow interaction via Touch (mobile) and Mouse (PC)
      AFRAME.registerComponent("touch-controls", {
        init: function () {
          const model = this.el;
          
          // --- TOUCH VARIABLES (Mobile) ---
          let touchStartX = 0;
          let initialPinchDist = 0;
          let startScale = 0;

          // --- MOUSE VARIABLES (PC Testing) ---
          let isDragging = false;
          let mouseStartX = 0;

          // --- 1. TOUCH EVENTS (Mobile) ---
          // { passive: false } ensures we can stop the browser from scrolling
          document.addEventListener("touchstart", (e) => {
            if (e.touches.length === 1) {
              touchStartX = e.touches[0].pageX;
            } else if (e.touches.length === 2) {
              const dx = e.touches[0].pageX - e.touches[1].pageX;
              const dy = e.touches[0].pageY - e.touches[1].pageY;
              initialPinchDist = Math.sqrt(dx * dx + dy * dy);
              startScale = model.getAttribute("scale").x;
            }
          }, { passive: false });

          document.addEventListener("touchmove", (e) => {
            e.preventDefault(); // Stop mobile screen from scrolling/refreshing

            if (e.touches.length === 1) {
              // Calculate Rotation
              const deltaX = e.touches[0].pageX - touchStartX;
              const currentRot = model.getAttribute("rotation");
              model.setAttribute("rotation", {
                x: currentRot.x,
                y: currentRot.y + deltaX * 1.5,
                z: currentRot.z,
              });
              touchStartX = e.touches[0].pageX;
            } else if (e.touches.length === 2) {
              // Calculate Zoom
              const dx = e.touches[0].pageX - e.touches[1].pageX;
              const dy = e.touches[0].pageY - e.touches[1].pageY;
              const currentDist = Math.sqrt(dx * dx + dy * dy);

              let newScale = startScale * (currentDist / initialPinchDist);
              newScale = Math.max(0.01, Math.min(newScale, 2.0)); 
              model.setAttribute("scale", `${newScale} ${newScale} ${newScale}`);
            }
          }, { passive: false });

          // --- 2. MOUSE EVENTS (PC Testing) ---
          document.addEventListener("mousedown", (e) => {
            isDragging = true;
            mouseStartX = e.clientX;
          });

          document.addEventListener("mousemove", (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - mouseStartX;
            const currentRot = model.getAttribute("rotation");
            model.setAttribute("rotation", {
              x: currentRot.x,
              y: currentRot.y + deltaX * 1.5,
              z: currentRot.z,
            });
            mouseStartX = e.clientX;
          });

          document.addEventListener("mouseup", () => {
            isDragging = false;
          });

          // Mouse scroll wheel for zooming
          document.addEventListener("wheel", (e) => {
            let currentScale = model.getAttribute("scale").x;
            let zoomAmount = e.deltaY * -0.001; 
            let newScale = currentScale + zoomAmount;
            
            newScale = Math.max(0.01, Math.min(newScale, 2.0));
            model.setAttribute("scale", `${newScale} ${newScale} ${newScale}`);
          });
        },
      });
    </script>
  </head>

  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="avatarModel" src="./Dimond.glb"></a-asset-item>
        <!-- <audio id="audio-element" src="./sound.mp3" preload="auto"></audio> -->
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" sound-handler>
        
        <a-gltf-model
          rotation="0 0 0"
          position="0 0.2 0"
          scale="0.1 0.1 0.1"
          src="#avatarModel"
          touch-controls
          animation-mixer
        >
        </a-gltf-model>
        
      </a-entity>
    </a-scene>
  </body>
</html>
