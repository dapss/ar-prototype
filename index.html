<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <script>
      // Component to play sound effects when the QR code/target is scanned
      AFRAME.registerComponent('sound-handler', {
        init: function () {
          const target = this.el;
          const audio = document.querySelector('#audio-element');

          target.addEventListener("targetFound", event => {
            console.log("Target found");
            audio.play();
          });

          target.addEventListener("targetLost", event => {
            console.log("Target lost");
            audio.pause();
            audio.currentTime = 0; // Reset audio to beginning
          });
        }
      });
    </script>
  </head>

  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./scene.gltf"></a-asset-item>
        <!-- <audio id="audio-element" src="./sound.mp3" preload="auto"></audio> -->
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" sound-handler>
        <a-gltf-model rotation="0 0 0" 
                      position="0 0 0" 
                      scale="0.5 0.5 0.5" 
                      src="#avatarModel" 
                      animation-mixer>
        </a-gltf-model>
      </a-entity>
      
    </a-scene>
  </body>
</html>
